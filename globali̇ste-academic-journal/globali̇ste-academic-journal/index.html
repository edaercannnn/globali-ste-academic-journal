      body {
        font-family: 'Roboto', sans-serif;
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.3s ease-out;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      /* Chatbot animations */
      .chat-enter {
        opacity: 0;
        transform: scale(0.9);
      }
      .chat-enter-active {
        opacity: 1;
        transform: scale(1);
        transition: opacity 300ms, transform 300ms;
      }
    </style>
